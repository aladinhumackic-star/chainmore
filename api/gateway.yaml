  # -------------------------------------------------------------------------
  # Widget / Hosted Checkout JSON surface (WGT-I1)
  # -------------------------------------------------------------------------
  /v1/checkout/widget/session:
    get:
      summary: Redacted widget view for the hosted checkout browser page.
      description: |
        Authenticated with the short-lived checkout token (not the merchant
        key): `Authorization: Bearer <raw-checkout-token>`, or as a
        `?token=` query fallback for curl. Returns the redacted view
        the widget renders from (WGT-I1).
      operationId: getWidgetSession
      security: []
      parameters:
        - name: token
          in: query
          required: false
          description: "Raw checkout token fallback when Authorization header is not used."
          schema: { type: string, minLength: 1, maxLength: 256 }
        - $ref: "#/components/parameters/CorrelationID"
      responses:
        '200':
          description: Widget view.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WidgetSessionView" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '404': { $ref: "#/components/responses/NotFound" }

  # -------------------------------------------------------------------------
