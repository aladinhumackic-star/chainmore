  # -------------------------------------------------------------------------
  # Merchant Integration control plane (IDX-I3 — self-service lifecycle)
  #
  # All mutations in this section derive (merchant_id, mode) from the
  # authenticated API key. IDX-I2 forbids mode assertion from the caller.
  # -------------------------------------------------------------------------
  /v1/keys:
    get:
      summary: List API keys for the authenticated merchant, scoped to the key's mode.
      operationId: listKeys
      parameters:
        - $ref: "#/components/parameters/CorrelationID"
      responses:
        '200':
          description: Keys in the caller's mode.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListKeysResponse" }
        '401': { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Mint a new API key for the authenticated merchant, in the caller's mode.
      operationId: createKey
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationID"
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateKeyRequest" }
      responses:
        '201':
          description: Key created — plaintext secret returned once.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateKeyResponse" }
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }

  /v1/keys/{id}:
    delete:
      summary: Revoke an API key. Idempotent — revoking an already-revoked key is a no-op.
      operationId: revokeKey
      parameters:
        - $ref: "#/components/parameters/APIKeyID"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationID"
      responses:
        '200':
          description: Revoked key record.
          content:
            application/json:
              schema:
                type: object
                required: [api_key]
                properties:
                  api_key: { $ref: "#/components/schemas/APIKey" }
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '404': { $ref: "#/components/responses/NotFound" }

  /v1/keys/{id}/rotate:
    post:
      summary: Rotate an API key — mint a successor, revoke the predecessor, in one transaction.
      operationId: rotateKey
      parameters:
        - $ref: "#/components/parameters/APIKeyID"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationID"
      responses:
        '201':
          description: Successor key minted; plaintext returned once; predecessor revoked.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RotateKeyResponse" }
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '404': { $ref: "#/components/responses/NotFound" }

  /v1/webhook_endpoints:
    get:
      summary: List webhook endpoints for the authenticated merchant, scoped to the key's mode.
      operationId: listWebhookEndpoints
      parameters:
        - $ref: "#/components/parameters/CorrelationID"
      responses:
        '200':
          description: Webhook endpoints in the caller's mode.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListEndpointsResponse" }
        '401': { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Register a new webhook endpoint, in the caller's mode.
      operationId: createWebhookEndpoint
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationID"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEndpointRequest" }
      responses:
        '201':
          description: Endpoint created; `whsec_*` signing secret returned once.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateEndpointResponse" }
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }

  /v1/webhook_endpoints/{id}:
    patch:
      summary: Update a webhook endpoint (url / events / enabled). Mode is not patchable.
      operationId: updateWebhookEndpoint
      parameters:
        - $ref: "#/components/parameters/WebhookEndpointID"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationID"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateEndpointRequest" }
      responses:
        '200':
          description: Updated endpoint record.
          content:
            application/json:
              schema:
                type: object
                required: [webhook_endpoint]
                properties:
                  webhook_endpoint: { $ref: "#/components/schemas/WebhookEndpoint" }
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '404': { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Disable a webhook endpoint. Idempotent.
      operationId: disableWebhookEndpoint
      parameters:
        - $ref: "#/components/parameters/WebhookEndpointID"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationID"
      responses:
        '200':
          description: Disabled endpoint record.
          content:
            application/json:
              schema:
                type: object
                required: [webhook_endpoint]
                properties:
                  webhook_endpoint: { $ref: "#/components/schemas/WebhookEndpoint" }
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '404': { $ref: "#/components/responses/NotFound" }

  /v1/webhook_endpoints/{id}/test:
    post:
      summary: Send a synthetic `payment.settled` test event to the endpoint.
      description: |
        IDX-R2b: exercises the real webhook delivery code path without
        real money movement. The resulting outbox row carries
        `is_test_event = TRUE` and `payment_id IS NULL`; the body
        carries `test_event: true` and synthetic `payment_id` /
        `merchant_order_id` / `event_id` on the `pmt_test_*` /
        `ord_test_*` / `whevt_test_*` shapes. The outbox row's `mode`
        is stamped from the authenticated bearer; a live-mode key may
        not test a test-mode endpoint and vice versa.
      operationId: sendTestWebhookEvent
      parameters:
        - $ref: "#/components/parameters/WebhookEndpointID"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationID"
      responses:
        '202':
          description: Test event enqueued for delivery.
          content:
            application/json:
              schema:
                type: object
                required: [event_id, outbox_id, endpoint_url, mode, created_at, is_test_event]
                properties:
                  event_id:
                    type: string
                    description: Synthetic event ID on the `whevt_test_*` shape.
                  outbox_id:
                    type: string
                    format: uuid
                    description: Primary key of the `webhook_outbox` row just written.
                  endpoint_url:
                    type: string
                    format: uri
                  mode:
                    type: string
                    enum: [test, live]
                  created_at:
                    type: string
                    format: date-time
                  is_test_event:
                    type: boolean
                    description: Always `true` for this endpoint's response.
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '404': { $ref: "#/components/responses/NotFound" }

  /v1/webhook_endpoints/{id}/rotate-secret:
    post:
      summary: Rotate the HMAC signing secret for a webhook endpoint. Same endpoint id, fresh secret.
      description: |
        IDX-R3: self-service secret rotation. Mints a new `whsec_*`
        signing secret, envelope-encrypts it, and atomically replaces
        `(secret_hash, secret_ciphertext, secret_kid, updated_at)` on
        the endpoint row. The endpoint's id, url, events, enabled, and
        mode are intentionally unchanged — same endpoint, new key.

        The plaintext is returned exactly once in the response body. At
        rest the row carries only the envelope ciphertext and the
        one-way hash; a lost plaintext means the merchant must call
        this endpoint again.

        Cutover semantics — any payload already signed with the OLD
        secret that arrives after the rotate commits will fail HMAC
        verification on the merchant side. Operate rotate around a
        verifier-update window; the suggested sequence is (1) call
        rotate-secret, (2) deploy the returned plaintext to the
        verifier, (3) observe that new deliveries verify, (4) accept
        the old secret is dead.

        Mode-scoped: a live-mode bearer cannot rotate a test-mode
        endpoint's secret (and vice versa) — the request returns 404.
      operationId: rotateWebhookEndpointSecret
      parameters:
        - $ref: "#/components/parameters/WebhookEndpointID"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationID"
      responses:
        '200':
          description: Secret rotated; plaintext returned once; endpoint id unchanged.
          content:
            application/json:
              schema:
                type: object
                required: [webhook_endpoint, secret]
                properties:
                  webhook_endpoint: { $ref: "#/components/schemas/WebhookEndpoint" }
                  secret:
                    type: string
                    description: |
                      New `whsec_*` signing secret. Returned exactly
                      once; never re-derivable thereafter.
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '404': { $ref: "#/components/responses/NotFound" }

  /v1/webhook_endpoints/{id}/deliveries/{did}/replay:
    post:
      summary: Replay a previously-emitted webhook delivery. Fresh event_id, fresh signature.
      description: |
        IDX-R2a: self-service replay of a historical webhook delivery.
        Writes a new `webhook_outbox` row that targets the same endpoint
        and carries the same semantic event, but is:

          - Signed with the CURRENT endpoint signing secret (not the
            historical secret stored on the original row).
          - Signed with a fresh `sig_timestamp` (now, RFC3339 UTC).
          - Stamped with a fresh `event_id` (the UNIQUE idempotency key).

        This signing contract is deliberate: if the merchant rotated the
        endpoint's signing secret via the rotate-secret endpoint between
        the original emit and this replay, the merchant's verifier no
        longer accepts signatures from the old secret. Re-signing with
        the current secret is the only shape that can verify at the
        merchant.

        The merchant correlates a replay back to the original delivery
        via the `replayed_from_event_id` field on the body. That field
        names the ORIGINAL `event_id` (the whevt-prefixed id the merchant
        already saw, or would have seen if the original delivered). The
        new delivery's own `event_id` is the FRESH replay id — merchants
        dedupe on event_id on their receiving side; a replay is a
        distinct delivery that happens to reference an earlier one.

        Refusals:
          - `replay_of_test_event_forbidden` (400): the delivery id
            references a test event (is_test_event=TRUE). Test events
            have their own replay path — call `POST /v1/webhook_endpoints/
            {id}/test` again.
          - `delivery_endpoint_mismatch` (400): the delivery id exists
            (merchant- and mode-scoped) but was emitted against a
            different endpoint id than the one in the path.
          - `endpoint_disabled` (400): the endpoint is currently disabled.
          - `endpoint_secret_missing_envelope` (400): the endpoint
            predates envelope-encrypted secrets (pre-MDB rollout).
            Resolve via rotate-secret, which populates envelope columns.

        Mode-scoped: a live-mode bearer cannot replay a test-mode
        delivery (and vice versa) — the request returns 404 with no
        leak of which scope the row actually lives in.

        Delivery itself is asynchronous — the response 202 confirms a
        new outbox row was written; the merchant observes completion at
        their HTTP endpoint (or via the delivery-history dashboard).
      operationId: replayWebhookDelivery
      parameters:
        - $ref: "#/components/parameters/WebhookEndpointID"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: did
          in: path
          required: true
          description: |
            The `delivery_id` (webhook_outbox.id) the merchant observed
            in the dashboard's delivery history. Server-side scoped by
            (merchant_id, mode, endpoint_id).
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationID"
      responses:
        '202':
          description: Replay row accepted; delivery is asynchronous via the outbox worker.
          content:
            application/json:
              schema:
                type: object
                required:
                  - event_id
                  - replayed_from_event_id
                  - outbox_id
                  - original_outbox_id
                  - endpoint_url
                  - mode
                  - created_at
                properties:
                  event_id:
                    type: string
                    description: The fresh event id for this replay delivery.
                  replayed_from_event_id:
                    type: string
                    description: The original delivery's event id. Merchants correlate on this field.
                  outbox_id:
                    type: string
                    format: uuid
                    description: The new webhook_outbox row id.
                  original_outbox_id:
                    type: string
                    format: uuid
                    description: The replayed webhook_outbox row id (same as path `did`).
                  endpoint_url:
                    type: string
                    format: uri
                  mode:
                    type: string
                    enum: [test, live]
                  created_at:
                    type: string
                    format: date-time
        '400':
          description: |
            Replay refused (test-event, endpoint mismatch, endpoint
            disabled, or missing envelope secret). Body is a Problem
            with one of the codes above.
        '401': { $ref: "#/components/responses/Unauthorized" }
        '404': { $ref: "#/components/responses/NotFound" }

# ---------------------------------------------------------------------------
# Webhooks (informational; body shape for merchant-side verifiers)
# ---------------------------------------------------------------------------
webhooks:
  payment.settled:
    post:
      summary: Sent when a payment reaches its settled terminal state.
      description: |
        Body is signed with HMAC-SHA256 over the raw bytes using the
        endpoint's `whsec_*` secret. The hex signature is carried in
        the `X-ChainMore-Signature` header. Consumers MUST use a
        timing-safe comparison.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookEvent" }
      responses:
        '2XX':
          description: Delivery acknowledged.
  payment.failed:
    post:
      summary: Sent when a payment reaches a failed terminal state.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookEvent" }
      responses:
        '2XX':
          description: Delivery acknowledged.
