<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Documentation | ChainMore</title>
  <meta name="description" content="ChainMore public API reference. Gateway (merchant-facing) and Treasury (operator-internal) OpenAPI specs rendered with Redoc. Every route, request schema, and response shape, in one place.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.chainmore.io/docs.html">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.chainmore.io/docs.html">
  <meta property="og:title" content="Developer Documentation | ChainMore">
  <meta property="og:description" content="Gateway (merchant-facing) and Treasury (operator-internal) OpenAPI specs, every route documented.">
  <meta property="og:site_name" content="ChainMore">
  <meta property="og:locale" content="en_US">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/tailwind.css">
  <style>
    * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "Noto Sans", sans-serif; }
    html { scroll-behavior: smooth; }
    /* Make Redoc fill the available space below the nav strip. The
       redoc-container is fixed-height to support its own internal scroll
       (TOC sidebar plus content pane). */
    .redoc-host { height: calc(100vh - 184px); min-height: 800px; }
    .redoc-host > div { height: 100%; }
    .spec-tab { transition: all 0.15s ease; }
    .spec-tab.active { color: #00bfe6; border-color: #00bfe6; }
    .spec-tab:hover { color: #00bfe6; }
  </style>
</head>
<body class="bg-white text-slate-700">

  <!-- Header -->
  <header class="bg-slate-900 text-white sticky top-0 z-50 border-b border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5">
        <svg width="32" height="32" viewBox="0 0 130 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 20 35 C 45 35, 55 50, 75 60 C 95 70, 105 60, 105 60" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path d="M 20 85 C 45 85, 55 70, 75 60 C 95 50, 105 60, 105 60" stroke="#94a3b8" stroke-width="6" fill="none" stroke-linecap="round"/>
          <circle cx="105" cy="60" r="10" fill="#00D9FF"/>
          <circle cx="105" cy="60" r="5" fill="#FFFFFF"/>
          <circle cx="20" cy="35" r="5" fill="#FFFFFF"/>
          <circle cx="20" cy="85" r="5" fill="#94a3b8"/>
        </svg>
        <span class="text-lg font-bold tracking-tight">
          <span class="text-white">Chain</span><span class="text-[#00D9FF]">More</span>
        </span>
      </a>
      <nav class="hidden md:flex items-center gap-8 text-sm">
        <a href="/#solutions" class="text-slate-300 hover:text-white transition">Solutions</a>
        <a href="/pricing.html" class="text-slate-300 hover:text-white transition">Pricing</a>
        <a href="/docs.html" class="text-white font-medium">Docs</a>
        <a href="/security" class="text-slate-300 hover:text-white transition">Security</a>
        <a href="/status.html" class="text-slate-300 hover:text-white transition">Status</a>
      </nav>
      <a href="/" class="text-sm text-slate-300 hover:text-white transition">← Back to homepage</a>
    </div>
  </header>

  <!-- Spec switcher -->
  <div class="bg-white border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center gap-1 overflow-x-auto">
        <a href="?spec=gateway" id="tab-gateway" class="spec-tab inline-flex items-center gap-2 px-4 py-3 border-b-2 border-transparent text-sm font-semibold text-slate-700 whitespace-nowrap">
          Gateway API
          <span class="text-xs font-normal text-slate-500">(merchant-facing)</span>
        </a>
        <a href="?spec=treasury" id="tab-treasury" class="spec-tab inline-flex items-center gap-2 px-4 py-3 border-b-2 border-transparent text-sm font-semibold text-slate-700 whitespace-nowrap">
          Treasury API
          <span class="text-xs font-normal text-slate-500">(operator-internal)</span>
        </a>
        <div class="ml-auto hidden md:flex items-center gap-3 text-xs text-slate-500 py-3">
          <span>Raw spec:</span>
          <a id="raw-gateway" href="/api/gateway.yaml" class="text-cyan-600 hover:underline">gateway.yaml</a>
          <span class="text-slate-300">·</span>
          <a id="raw-treasury" href="/api/treasury.yaml" class="text-cyan-600 hover:underline">treasury.yaml</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Redoc target -->
  <main class="redoc-host">
    <div id="redoc-container"></div>
  </main>

  <!-- Footer (compact, the docs page is dense and footer is rarely the focus) -->
  <footer class="bg-slate-950 text-slate-400 py-8 border-t border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-2 flex-wrap justify-center text-sm">
          <a href="/" class="hover:text-white transition">← Home</a>
          <span class="text-slate-700">·</span>
          <a href="/pricing.html" class="hover:text-white transition">Pricing</a>
          <span class="text-slate-700">·</span>
          <a href="/docs.html" class="hover:text-white transition">Docs</a>
          <span class="text-slate-700">·</span>
          <a href="/status.html" class="hover:text-white transition">Status</a>
          <span class="text-slate-700">·</span>
          <a href="/security" class="hover:text-white transition">Security</a>
          <span class="text-slate-700">·</span>
          <a href="/legal/dpa.html" class="hover:text-white transition">DPA</a>
          <span class="text-slate-700">·</span>
          <a href="/legal/sub-processors.html" class="hover:text-white transition">Sub-Processors</a>
        </div>
        <div class="text-xs">© 2026 Chainmore OÜ · Patent pending</div>
      </div>
    </div>
  </footer>

  <!-- Self-hosted Redoc bundle. Vendor JS is checked in at
       marketing/site/assets/redoc.standalone.js so the page stays
       compatible with our strict CSP (script-src 'self'); no third-
       party CDN script ever loads on chainmore.io. -->
  <script src="/assets/redoc.standalone.js"></script>
  <script>
    (function () {
      // Resolve which spec to render from ?spec=… (default: gateway).
      // Two specs ship today; if more land later, add them to specs[]
      // and let the same query string drive the switcher.
      var specs = {
        gateway: {
          url: "/api/gateway.yaml",
          tabId: "tab-gateway",
        },
        treasury: {
          url: "/api/treasury.yaml",
          tabId: "tab-treasury",
        },
      };

      var params = new URLSearchParams(window.location.search);
      var requested = params.get("spec");
      var picked = specs[requested] ? requested : "gateway";

      // Highlight the active tab so visitors land where they think
      // they are.
      var tabEl = document.getElementById(specs[picked].tabId);
      if (tabEl) tabEl.classList.add("active");

      // Theme tuned to match the marketing-site palette: brand-cyan
      // accent, JetBrains-style mono, and an Inter-like sans stack
      // that mirrors what the rest of the site already uses (so we
      // do NOT load Roboto from Google Fonts, which would break our
      // CSP font-src 'self').
      var theme = {
        colors: {
          primary: { main: "#00bfe6" },
          success: { main: "#10b981" },
          warning: { main: "#f59e0b" },
          error:   { main: "#ef4444" },
          text:    { primary: "#0f172a", secondary: "#475569" },
          border:  { dark: "#cbd5e1", light: "#e2e8f0" },
          http: {
            get:    "#10b981",
            post:   "#0ea5e9",
            put:    "#f59e0b",
            options:"#94a3b8",
            patch:  "#a855f7",
            delete: "#ef4444",
            basic:  "#475569",
            link:   "#0891b2",
            head:   "#475569",
          },
        },
        typography: {
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "Noto Sans", sans-serif',
          headings: {
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "Noto Sans", sans-serif',
            fontWeight: "700",
          },
          code: {
            fontFamily: 'ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, monospace',
          },
        },
        sidebar: {
          backgroundColor: "#f8fafc",
          textColor: "#0f172a",
          width: "280px",
        },
        rightPanel: {
          backgroundColor: "#0f172a",
          textColor: "#f1f5f9",
        },
      };

      // disableSearch:false so the integrated search keeps working;
      // hideDownloadButton:false so visitors get a one-click download
      // of the spec they're looking at; expandResponses:"200,201" so
      // the most-relevant success-response shape is open by default.
      Redoc.init(
        specs[picked].url,
        {
          theme: theme,
          scrollYOffset: 64,
          hideDownloadButton: false,
          disableSearch: false,
          expandResponses: "200,201",
          hideHostname: false,
          jsonSampleExpandLevel: 2,
          // No third-party telemetry; turn off Redoc's "View on
          // GitHub" / "Try it" links that point off-domain because
          // the spec is internal-source-of-truth, not the public
          // contract surface yet.
          showExtensions: false,
          requiredPropsFirst: true,
          sortPropsAlphabetically: false,
        },
        document.getElementById("redoc-container")
      );
    })();
  </script>
</body>
</html>
